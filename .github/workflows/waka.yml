name: ⏱️ WakaTime Stats

on:
  schedule:
    - cron: "30 18 * * *"   # Daily at 6:30 PM UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    name: Update README with WakaTime Stats

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_PROJECTS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_LOC_CHART: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_PROFILE_VIEWS: "True"
          COMMIT_MESSAGE: "⏱️ Auto-update WakaTime stats [skip ci]"

# ─── SETUP ───────────────────────────────────────────────────────────────
# 1. Sign up free at wakatime.com
# 2. Install WakaTime extension in VS Code
#    (it auto-tracks your coding time in background)
# 3. Get API key: wakatime.com/api-key
# 4. Add secrets in repo Settings → Secrets → Actions:
#    WAKATIME_API_KEY = (your wakatime key)
#    GH_TOKEN        = (GitHub PAT with repo scope)
# 5. Run this workflow once manually → stats appear in README!
