name: 📦 Auto-Update Projects

on:
  schedule:
    - cron: "0 3 * * *"   # Daily at 3 AM UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run project auto-update script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python auto_update_projects.py

      - name: Commit & push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "✅ No changes needed." || (
            git commit -m "📦 Auto-update projects — $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          )

# ─── SETUP ───────────────────────────────────────────────────────────────
# 1. Upload auto_update_projects.py to root of your Yashdahiya19 repo
# 2. Upload this file to .github/workflows/update-projects.yml
# 3. Add GH_TOKEN secret (PAT with repo scope) in repo Settings → Secrets
# 4. Go to Actions → "📦 Auto-Update Projects" → Run workflow
# 5. Your README projects section auto-populates from GitHub API! ✅
